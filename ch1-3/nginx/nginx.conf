worker_processes  auto;

events {
    worker_connections  1024;
}

http {
    # Round-Robin (default) 負載均衡: 平均分發給 app1 與 app2
    upstream weather_backend {
        server app1:8080;
        server app2:8080;
    }

    # 觀察用: 將 upstream 實際選到的後端寫到 response header
    log_format  lb_log  '$remote_addr - [$time_local] "$request" '
                        '$status upstream=$upstream_addr';

    access_log  /var/log/nginx/access.log  lb_log;

    server {
        listen 80;

        location / {
            proxy_pass         http://weather_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            add_header X-Upstream $upstream_addr always;
        }
    }
}
