services:
  # ---------------------------------------------------------------------------
  # Data Tier: PostgreSQL Master / Slave (Streaming Replication via bitnami)
  # ---------------------------------------------------------------------------
  postgres-master:
    image: bitnami/postgresql:latest
    container_name: postgres-master
    environment:
      POSTGRESQL_USERNAME: weather
      POSTGRESQL_PASSWORD: weatherpwd
      POSTGRESQL_DATABASE: weatherdb
      POSTGRESQL_REPLICATION_MODE: master
      POSTGRESQL_REPLICATION_USER: repl_user
      POSTGRESQL_REPLICATION_PASSWORD: repl_pwd
      POSTGRESQL_POSTGRES_PASSWORD: postgres_pwd
    volumes:
      - pg_master_data:/bitnami/postgresql
      - ./postgres/master/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U weather -d weatherdb"]
      interval: 10s
      timeout: 5s
      retries: 10

  postgres-slave:
    image: bitnami/postgresql:latest
    container_name: postgres-slave
    depends_on:
      postgres-master:
        condition: service_healthy
    environment:
      POSTGRESQL_USERNAME: weather
      POSTGRESQL_PASSWORD: weatherpwd
      POSTGRESQL_DATABASE: weatherdb
      POSTGRESQL_MASTER_HOST: postgres-master
      POSTGRESQL_MASTER_PORT_NUMBER: 5432
      POSTGRESQL_REPLICATION_MODE: slave
      POSTGRESQL_REPLICATION_USER: repl_user
      POSTGRESQL_REPLICATION_PASSWORD: repl_pwd
      POSTGRESQL_POSTGRES_PASSWORD: postgres_pwd
    volumes:
      - pg_slave_data:/bitnami/postgresql
    ports:
      - "5433:5432"
    networks:
      - backend

  # ---------------------------------------------------------------------------
  # Cache Tier: Redis
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - backend
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ---------------------------------------------------------------------------
  # Message Queue: RabbitMQ (with management UI on 15672)
  # ---------------------------------------------------------------------------
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"     # AMQP
      - "15672:15672"   # Management UI
    networks:
      - backend
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ---------------------------------------------------------------------------
  # Web Tier: 兩個 Stateless Spring Boot 實例
  # ---------------------------------------------------------------------------
  app1:
    build:
      context: ./webapp
    container_name: app1
    hostname: app1
    environment:
      HOSTNAME: app1
      MASTER_JDBC_URL: jdbc:postgresql://postgres-master:5432/weatherdb
      SLAVE_JDBC_URL:  jdbc:postgresql://postgres-slave:5432/weatherdb
      DB_USERNAME: weather
      DB_PASSWORD: weatherpwd
      REDIS_HOST: redis
      RABBITMQ_HOST: rabbitmq
    depends_on:
      postgres-master:
        condition: service_healthy
      postgres-slave:
        condition: service_started
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - backend

  app2:
    build:
      context: ./webapp
    container_name: app2
    hostname: app2
    environment:
      HOSTNAME: app2
      MASTER_JDBC_URL: jdbc:postgresql://postgres-master:5432/weatherdb
      SLAVE_JDBC_URL:  jdbc:postgresql://postgres-slave:5432/weatherdb
      DB_USERNAME: weather
      DB_PASSWORD: weatherpwd
      REDIS_HOST: redis
      RABBITMQ_HOST: rabbitmq
    depends_on:
      postgres-master:
        condition: service_healthy
      postgres-slave:
        condition: service_started
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - backend

  # ---------------------------------------------------------------------------
  # Load Balancer: Nginx (Round Robin)
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    container_name: nginx
    depends_on:
      - app1
      - app2
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - backend

networks:
  backend:
    driver: bridge

volumes:
  pg_master_data:
  pg_slave_data:
  redis_data:
